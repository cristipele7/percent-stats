name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
    
    - name: Setup Nx
      uses: nrwl/nx-set-shas@v4
    
    - name: Run lint, test, build
      run: npx nx affected --base=$NX_BASE --head=$NX_HEAD --target=lint,test,build
      env:
        NX_BASE: ${{ github.event.before || 'origin/main~1' }}
        NX_HEAD: ${{ github.event.after || 'HEAD' }}
